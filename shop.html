<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Mi Tienda</h1>

<div class="productos">

    <div class="producto">
        <h3>Notebook</h3>
        <p>$1200</p>
        <button onclick="agregarProducto(1,'Notebook',1200)">
            Agregar
        </button>
    </div>

    <div class="producto">
        <h3>Mouse</h3>
        <p>$35</p>
        <button onclick="agregarProducto(2,'Mouse',35)">
            Agregar
        </button>
    </div>

    <div class="producto">
        <h3>Teclado</h3>
        <p>$80</p>
        <button onclick="agregarProducto(3,'Teclado',80)">
            Agregar
        </button>
    </div>

</div>

<hr>

<h2>Carrito</h2>

<table>
    <thead>
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio</th>
            <th>Subtotal</th>
            <th></th>
        </tr>
    </thead>

    <tbody id="carrito"></tbody>

</table>

<h3 id="total"></h3>

<button onclick="vaciarCarrito()">
    Vaciar carrito
</button>

<script src="app.js"></script>

</body>
</html>
